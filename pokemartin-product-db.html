<!DOCTYPE html>

<title>PokéMartin — Base de données produits</title>
<style>
  :root {
    --bg: #0d0f1a;
    --card: #161928;
    --border: #2a3050;
    --yellow: #ffd60a;
    --text: #e8eaf0;
    --muted: #6b7280;
    --red: #ef4444;
    --green: #22c55e;
    --blue: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
  h1 { font-size: 1.4rem; font-weight: 800; color: var(--yellow); margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.15s; }
  .tab.active { background: var(--yellow); color: #000; border-color: var(--yellow); }
  .search-bar { width: 100%; padding: 10px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.9rem; margin-bottom: 16px; outline: none; }
  .search-bar:focus { border-color: var(--yellow); }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--card); padding: 10px 12px; text-align: left; font-size: 0.78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 2; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: rgba(255,214,10,0.04); }
  td { padding: 10px 12px; font-size: 0.85rem; vertical-align: middle; }
  .prod-name { font-weight: 700; }
  .serie-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 600; background: rgba(255,214,10,0.12); color: var(--yellow); white-space: nowrap; }
  .serie-badge.ch { background: rgba(59,130,246,0.12); color: var(--blue); }
  input.editable { background: rgba(255,255,255,0.05); border: 1px solid transparent; border-radius: 6px; color: var(--text); padding: 4px 8px; width: 80px; text-align: center; font-size: 0.85rem; transition: all 0.15s; }
  input.editable:focus { outline: none; border-color: var(--yellow); background: rgba(255,214,10,0.05); }
  input.editable.wide { width: 160px; text-align: left; }
  .btn { padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; font-size: 0.82rem; transition: all 0.15s; }
  .btn-yellow { background: var(--yellow); color: #000; }
  .btn-yellow:hover { background: #e6c009; }
  .btn-outline { background: none; border: 1px solid var(--border); color: var(--muted); }
  .btn-outline:hover { border-color: var(--yellow); color: var(--yellow); }
  .btn-red { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .actions-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .counter { color: var(--muted); font-size: 0.82rem; margin-left: auto; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #000; padding: 10px 18px; border-radius: 10px; font-weight: 700; font-size: 0.88rem; transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 100; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .code-output { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; font-family: monospace; font-size: 0.75rem; color: var(--text); white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; margin-top: 16px; display: none; }
  .changed { background: rgba(255,214,10,0.08) !important; }
  .info-col { max-width: 200px; }
</style>
</head>

<h1>⚡ PokéMartin — Base de données produits</h1>
<p class="subtitle">Modifie le nombre de boosters, cartes/booster et Pokémon vedettes. Clique "Exporter JS" pour copier le code à intégrer.</p>

<div class="tabs">
  <button class="tab active" onclick="filterTab('all',this)">Tous</button>
  <button class="tab" onclick="filterTab('KR',this)">🇰🇷 Coréen</button>

</div>

<div class="actions-bar">
  <input class="search-bar" id="search" placeholder="Rechercher un produit..." oninput="renderTable()" style="margin-bottom:0;width:260px;">
  <button class="btn btn-yellow" onclick="exportJS()">📋 Exporter JS</button>
  <button class="btn btn-outline" onclick="resetChanges()">↺ Réinitialiser</button>
  <span class="counter" id="counter"></span>
</div>

function filterTab(lang, btn) {
  currentFilter = lang;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

  const entries = Object.entries(DB).filter(([name, d]) => {
    if (currentFilter !== 'all' && d.lang !== currentFilter) return false;
    if (q && !name.toLowerCase().includes(q) && !d.serie.toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById('counter').textContent = entries.length + ' produits';
  tbody.innerHTML = entries.map(([name, d]) => {
    const isChanged = changed[name];
    return `<tr class="${isChanged ? 'changed' : ''}">
      <td class="prod-name">${name}</td>
      <td><span class="serie-badge ${d.lang === 'CH' ? 'ch' : ''}">${d.serie}</span></td>
      <td><input class="editable" type="number" min="0" max="200" value="${d.packs}" onchange="update('${name}','packs',this.value)" /></td>
      <td><input class="editable" type="number" min="0" max="20" value="${d.cpp}" onchange="update('${name}','cpp',this.value)" /></td>
      <td><input class="editable wide" type="text" value="${d.pokemon}" onchange="update('${name}','pokemon',this.value)" /></td>
    </tr>`;
  }).join('');
}

function update(name, field, val) {
  const parsed = field === 'pokemon' ? val : parseInt(val) || 0;
  DB[name][field] = parsed;
  if (parsed !== originalDB[name]?.[field]) {
    changed[name] = true;
  } else {
    // Check if all fields match original
    const d = DB[name], o = originalDB[name];
    if (d.packs === o.packs && d.cpp === o.cpp && d.pokemon === o.pokemon) delete changed[name];
  }
  renderTable();
}

function resetChanges() {
  Object.keys(changed).forEach(k => {
    DB[k].packs = originalDB[k].packs;
    DB[k].cpp = originalDB[k].cpp;
    DB[k].pokemon = originalDB[k].pokemon;
  });
  changed = {};
  renderTable();
}

function exportJS() {
  // Generate the PRODUCT_INFO JS object to paste into index.html
  const entries = Object.entries(DB);
  let out = 'window.PRODUCT_INFO = {\n';
  entries.forEach(([name, d], i) => {
    const content = d.packs > 0
      ? `${d.packs} booster${d.packs > 1 ? 's' : ''} · ${d.cpp} carte${d.cpp > 1 ? 's' : ''}/booster`
      : 'Coffret collector';
    // Keep existing img URLs from current PRODUCT_INFO
    out += `  ${JSON.stringify(name)}: {content:${JSON.stringify(content)},pokemon:${JSON.stringify(d.pokemon)},packs:${d.packs},cardsPerPack:${d.cpp}}${i < entries.length-1 ? ',' : ''}\n`;
  });
  out += '};';

  const el = document.getElementById('code-output');
  el.style.display = 'block';
  el.textContent = out;

  navigator.clipboard.writeText(out).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  });
}

renderTable();
</script>
</body>
</html>
